<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>《百年孤独》统计页面</title>
    <style>
      :root {
        --bg: #f5f7fb;
        --surface: #ffffff;
        --ink: #172033;
        --muted: #637084;
        --line: #dce5ee;
        --blue: #1f63a6;
        --teal: #16877f;
        --shadow: 0 14px 38px rgba(23, 32, 51, 0.08);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          "PingFang SC", "Microsoft YaHei", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-width: 320px;
        background: var(--bg);
        color: var(--ink);
      }

      main {
        width: min(1080px, 100%);
        margin: 0 auto;
        padding: clamp(28px, 6vw, 70px) clamp(16px, 4vw, 40px);
      }

      .eyebrow {
        margin: 0 0 10px;
        color: var(--teal);
        font-size: 12px;
        font-weight: 820;
        letter-spacing: 0;
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(30px, 5vw, 52px);
        line-height: 1.08;
        letter-spacing: 0;
      }

      .lede {
        max-width: 720px;
        margin: 0 0 28px;
        color: var(--muted);
        font-size: 17px;
        line-height: 1.7;
      }

      .link-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
      }

      a.card {
        display: block;
        min-height: 220px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        box-shadow: var(--shadow);
        padding: 22px;
        color: inherit;
        text-decoration: none;
      }

      a.card:hover,
      a.card:focus-visible {
        border-color: var(--teal);
        outline: none;
        box-shadow: 0 0 0 3px rgba(22, 135, 127, 0.16), var(--shadow);
      }

      .card strong {
        display: block;
        margin-bottom: 12px;
        color: var(--blue);
        font-size: 25px;
        line-height: 1.25;
      }

      .card p {
        margin: 0;
        color: var(--muted);
        line-height: 1.7;
      }

      .card span {
        display: inline-block;
        margin-top: 22px;
        color: var(--teal);
        font-weight: 820;
      }

      @media (max-width: 760px) {
        .link-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">One Hundred Years of Solitude</p>
      <h1>《百年孤独》统计页面</h1>
      <p class="lede">这里是入口页。人物章节热力图和星期事件统计现在分别放在独立目录，避免互相覆盖。</p>

      <section class="link-grid" aria-label="统计页面入口">
        <a class="card" href="./people/">
          <strong>人物章节热力图</strong>
          <p>按代际、章节和性别查看人物提及次数，保留原来的交互式章节热力表。</p>
          <span>打开人物统计</span>
        </a>

        <a class="card" href="./weekday-events/">
          <strong>星期事件统计</strong>
          <p>整理 Sunday 到 Saturday 的 117 次星期词提及，按章节、星期和主题查看事件摘要。</p>
          <span>打开星期统计</span>
        </a>
      </section>
    </main>
  </body>
</html>
