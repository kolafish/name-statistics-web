<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 330" role="img" aria-labelledby="title desc">
  <title id="title">热门划线关键词云</title>
  <desc id="desc">根据热门划线数据中的高频主题、人物和短句生成的词云。</desc>
  <rect width="1180" height="330" rx="18" fill="#101820"/>
  <rect width="1180" height="330" rx="18" fill="url(#wash)" opacity="0.9"/>
  <defs>
    <linearGradient id="wash" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#123b43"/>
      <stop offset="0.48" stop-color="#182634"/>
      <stop offset="1" stop-color="#422c22"/>
    </linearGradient>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>
  <g font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" filter="url(#soft-shadow)">
    <text x="54" y="77" fill="#7ee0c7" font-size="48" font-weight="850">多年以后，面对行刑队</text>
    <text x="612" y="80" fill="#f5c96b" font-size="42" font-weight="830">注定经受百年孤独</text>
    <text x="94" y="153" fill="#f8fbff" font-size="54" font-weight="860">家族</text>
    <text x="276" y="155" fill="#d7f4ed" font-size="42" font-weight="820">命运</text>
    <text x="452" y="150" fill="#f3dfb3" font-size="34" font-weight="800">回忆没有归路</text>
    <text x="728" y="154" fill="#bde7ff" font-size="44" font-weight="850">不会有第二次机会</text>
    <text x="52" y="223" fill="#cce9e5" font-size="34" font-weight="810">奥雷里亚诺</text>
    <text x="292" y="225" fill="#f8fbff" font-size="46" font-weight="850">孤独</text>
    <text x="452" y="224" fill="#92d7c5" font-size="30" font-weight="800">父亲带他去见识冰块</text>
    <text x="776" y="224" fill="#f5c96b" font-size="34" font-weight="830">过去都是假的</text>
    <text x="96" y="288" fill="#f5c96b" font-size="30" font-weight="800">马孔多在下雨</text>
    <text x="334" y="288" fill="#9fd7ff" font-size="28" font-weight="780">羊皮卷</text>
    <text x="474" y="287" fill="#f8fbff" font-size="36" font-weight="840">时间</text>
    <text x="620" y="288" fill="#d6efe9" font-size="27" font-weight="790">科学消除了距离</text>
    <text x="884" y="288" fill="#f2d9b4" font-size="30" font-weight="820">爱情</text>
    <text x="1010" y="286" fill="#8fe1c8" font-size="25" font-weight="780">预言</text>
    <text x="995" y="126" fill="#d2e8ff" font-size="24" font-weight="780">乌尔苏拉</text>
    <text x="54" y="112" fill="#f2d9b4" font-size="22" font-weight="760">开篇临刑回忆</text>
    <text x="958" y="190" fill="#d7f4ed" font-size="24" font-weight="790">梅尔基亚德斯</text>
    <text x="604" y="117" fill="#9bd9cf" font-size="23" font-weight="780">终章命运预言</text>
  </g>
</svg>
